# VaultMind Configuration
#
# This file holds ALL non-secret settings.
# Secrets (API keys, bot token) go in .env — see .env.example.

[vault]
path = "~/.vaultmind/vault"
inbox_folder = "00-inbox"
daily_folder = "01-daily"
templates_folder = "06-templates"
meta_folder = "_meta"
sync_interval_seconds = 300
excluded_folders = [".obsidian", ".git", ".trash"]

[embedding]
provider = "openai"           # "openai" or "voyage"
model = "text-embedding-3-small"
dimensions = 1536
batch_size = 64
cache_enabled = true

[chroma]
persist_dir = "~/.vaultmind/data/chromadb"
collection_name = "vault_chunks"
distance_fn = "cosine"

[graph]
persist_path = "~/.vaultmind/data/knowledge_graph.json"
extraction_model = ""         # Empty = use llm.thinking_model
min_confidence = 0.7
enrichment_schedule = "0 3 * * *"

[llm]
provider = "openai"        # "anthropic", "openai", "gemini", "ollama"
thinking_model = "gpt-5.2"
fast_model = "gpt-4.1"
max_context_notes = 8
max_tokens = 4096
ollama_base_url = "http://localhost:11434"
graph_context_enabled = true
graph_hop_depth = 2
graph_min_confidence = 0.6
graph_max_relationships = 20

# Provider-specific model examples:
#   anthropic:  claude-sonnet-4-20250514, claude-opus-4-20250514
#   openai:     gpt-4.1, gpt-4.1-mini
#   gemini:     gemini-2.5-flash, gemini-2.5-pro
#   ollama:     llama3.3, qwen3, deepseek-r1

[telegram]
thinking_session_ttl = 3600

[routing]
chat_model = ""                   # Empty = use llm.fast_model
chat_max_tokens = 1024
vault_context_enabled = true
max_context_chunks = 4
capture_all = false               # true = old behavior (all text → capture)

[watch]
debounce_ms = 500
hash_stability_check = true
reextract_graph = false              # LLM call per note — opt-in only
batch_graph_interval_seconds = 300   # 5 min batch window when enabled

[duplicate_detection]
enabled = true
min_content_length = 100             # skip very short notes

[note_suggestions]
enabled = true
min_content_length = 100
entity_weight = 0.1                  # boost per shared graph entity
graph_weight = 0.05                  # boost from graph path proximity

[search]
page_size = 5
max_results = 25
session_ttl = 300                        # seconds before paginated session expires
hybrid_enabled = true
bm25_db_path = ""                        # Empty = default ~/.vaultmind/data/bm25.db

[ranking]
enabled = true

[maturation]
enabled = true
schedule_day = "sunday"
schedule_hour = 9
timezone = "UTC"
min_cluster_size = 3
max_clusters_per_digest = 3
cluster_eps = 0.25
synthesis_max_tokens = 1500
synthesis_model = ""                         # Empty = use llm.thinking_model
target_note_types = ["fleeting", "literature"]
dismissed_cluster_expiry_days = 90
inbox_folder = "00-inbox"

[evolution]
enabled = true
confidence_drift_threshold = 0.3
stale_days = 180
min_confidence_for_stale = 0.8
max_results = 10
include_in_digest = true

[digest]
enabled = true
period_days = 7
schedule_hour = 8
timezone = "UTC"
save_to_vault = true
send_telegram = true
max_trending = 10
max_suggestions = 5
connection_threshold_low = 0.70
connection_threshold_high = 0.85

[auto_tag]
enabled = true
max_tags_per_note = 2
min_content_length = 100
tagging_model = ""                       # Empty = use llm.fast_model

[voice]
enabled = true
whisper_model = "whisper-1"
language = ""                            # Empty = auto-detect

[ingest]
enabled = true
youtube_language = "en"
max_content_length = 100000
inbox_folder = "00-inbox"

[research]
max_results = 5
output_folder = "research"
youtube_language = "en"

[tracking]
enabled = true
db_path = ""                                # Empty = default ~/.vaultmind/data/preferences.db

[activation]
enabled = true
half_life_days = 14.0
db_path = ""                                # Empty = default ~/.vaultmind/data/activations.db

[mcp]
enabled = false
host = "127.0.0.1"
port = 8765

# MCP Profile definitions — customize per-agent access
# Activate with: vaultmind mcp-serve --profile <name>
# Default (no flag): researcher (read-only)

[mcp.profiles.researcher]
description = "Read-only access for research and Q&A tasks"
allowed_tools = ["vault_search", "vault_read", "vault_list", "graph_query", "graph_path"]
folder_scope = ["*"]
write_enabled = false

[mcp.profiles.planner]
description = "Read/write access for project planning"
allowed_tools = ["vault_search", "vault_read", "vault_write", "vault_list", "graph_query", "graph_path", "capture"]
folder_scope = ["02-projects", "00-inbox"]
write_enabled = true
max_note_size_bytes = 50000

[mcp.profiles.full]
description = "Unrestricted access — requires explicit opt-in"
allowed_tools = ["*"]
folder_scope = ["*"]
write_enabled = true
requires_confirmation = true
