# VaultMind contradiction-detection eval set — labeled note pairs for
# `vaultmind eval contradict`.
#
# This is a STARTER TEMPLATE, not real data about any vault. Replace or extend
# the example entries below with pairs authored against your own vault before
# relying on this eval to gate `[contradiction].auto_resolve`.
#
# Schema (per entry):
#   id:                    stable unique identifier (string)
#   note_a_title/body:     first note in the pair, as it would appear in the vault
#   note_b_title/body:     second note in the pair
#   materially_conflicts:  true  -> the two notes assert different, incompatible
#                                   facts about the same subject
#                          false -> the notes overlap, elaborate on each other,
#                                   or are near-duplicates without a factual conflict
#
# `vaultmind eval contradict` runs the LLM conflict-detector over every pair and
# reports precision/recall/F1 against these labels, alongside a trivial
# always-escalate baseline (predicts `true` for every pair) — the detector must
# beat that baseline before `[contradiction].auto_resolve` is safe to enable.

version: 1
